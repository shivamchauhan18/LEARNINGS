<!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>

    <style>
        table {
            width: 50%;
            margin: 20px auto;
            border: 2px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }

        table:hover {
            background-color: pink;
        }

        tr:hover {
            background-color: lightblue;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Roll No.</th>
        </tr>

        <tr>
            <td>Shivam Chauhan</td>
            <td>37</td>
        </tr>

        <tr>
            <td>Aarav Sharma</td>
            <td>01</td>
        </tr>

        <tr>
            <td>Priya Verma</td>
            <td>12</td>
        </tr>

        <tr>
            <td>Rahul Singh</td>
            <td>18</td>
        </tr>

        <tr>
            <td>Ananya Gupta</td>
            <td>25</td>
        </tr>

        <tr>
            <td>Karan Patel</td>
            <td>31</td>
        </tr>

        <tr>
            <td>Neha Kapoor</td>
            <td>42</td>
        </tr>

        <tr>
            <td>Rohan Mehta</td>
            <td>50</td>
        </tr>
    </table>

</body>
</html>
