<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:100px;
    padding:100px;
    margin:20px;
    border:2px solid black;
    box-shadow:5px 5px 10px gray;
    cursor:pointer;
}

img{
    width:200px;
    height:150px;
    margin: 20px;
    
}

img:hover{
    box-shadow:5px 5px 10px blue;
}
</style>
</head>

<body>

<div class="box">
    <h3>Shadow Box</h3>
    <p>Hover the cursor over the image.</p>
</div>

<img src="bus.png" alt="Pink Bus Image">

</body>
</html>
