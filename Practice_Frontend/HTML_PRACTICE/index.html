<!DOCTYPE html>
<!-- Declares that this document is an HTML5 document -->

<html>
<!-- Root element of the HTML page -->

<head>
    <!-- Head section contains information about the webpage -->

    <title>HTML Basics Assignment</title>
    <!-- Title displayed on the browser tab -->

    <style>
        /* -----------------------------
           CSS Pseudo Class
           Changes the link color when the mouse is placed over it
        ----------------------------- */
        a:hover {
            color: red;
        }

        /* -----------------------------
           CSS Pseudo Element
           Styles the first letter of every paragraph
        ----------------------------- */
        p::first-letter {
            font-size: 30px;
            color: blue;
        }
    </style>

</head>

<body>

    <!-- Main Heading -->
    <h1 id="top">HTML Basics Assignment</h1>

    <!-- Paragraph -->
    <p>This webpage demonstrates basic HTML tags.</p>

    <!-- Bold Text -->
    <b>This is Bold Text</b>

    <br><br>

    <!-- Italic Text -->
    <i>This is Italic Text</i>

    <br><br>

    <!-- Anchor (Hyperlink) -->
    <a href="https://www.google.com">Visit Google</a>

    <br><br>

    <!-- Internal Navigation Link -->
    <a href="#section2">Go to Section 2</a>

    <hr>
    <!-- Horizontal Line -->

    <!-- Division -->
    <div>

        <!-- Section Heading -->
        <h2 id="section2">Section 2</h2>

        <!-- Unordered List -->
        <ul>
            <!-- List Items -->
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>

        <!-- Label -->
        <label>Name:</label>

        <!-- Input Box -->
        <input type="text">

        <br><br>

        <!-- Blockquote -->
        <blockquote>
            Learning HTML is simple and interesting.
        </blockquote>

        <!-- Image -->
        <img src="https://imgs.search.brave.com/j3Mf8I6NGkdm6MGyMgBZRWXM09lVWtAsNtgQT8PPDlE/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5nZXR0eWltYWdl/cy5jb20vaWQvMTU4/NDMxNjkzNi9waG90/by9vcGVuLWJvb2su/anBnP3M9NjEyeDYx/MiZ3PTAmaz0yMCZj/PUc0QnYweG9TeFoz/eVh2em5iMzFYM01U/Njdyank0cjNyWXlX/N08tLW03NjQ9"alt="Sample Image">

        <br><br>

        <!-- Span -->
        <span style="color: green;">
            This is a Span element.
        </span>

    </div>

    <br><br>

    <!-- Link to return to the top of the page -->
    <a href="#top">Back to Top</a>

</body>

</html>
