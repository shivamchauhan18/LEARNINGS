<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Assignments</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .section {
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
        }

        #msg {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            color: green;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #777;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>JavaScript Assignments</h1>

        <!-- Assignment 1 -->
        <div class="section">
            <button id="btn">Sort Fruits</button>
        </div>

        <hr>

        <!-- Assignment 2 -->
        <div class="section">
            <button id="btn2">Click to Disappear the Button</button>
        </div>

        <hr>

        <!-- Assignment 3 -->
        <div class="section">
            <button id="btn3">Counter</button>
        </div>

        <hr>

        <!-- Assignment 4 -->
        <div class="section">
            <button id="btn4">Show Date & Time</button>
            <p id="dateTime" style="margin-top:10px; text-align:center; color:#333;"></p>
        </div>

        <hr>

        <!-- Assignment 5 -->
        <div class="section">
            <input
                type="text"
                id="name"
                placeholder="Enter your name"
            >

            <button onclick="validate()">Submit</button>

            <p id="msg"></p>
        </div>

        <div class="footer">
            JavaScript Practice Assignments
        </div>

    </div>

    <!-- JavaScript Files -->
    <script src="js_assignment1.js"></script>
    <script src="js_assignment2.js"></script>
    <script src="js_assignment3.js"></script>

</body>
</html>
